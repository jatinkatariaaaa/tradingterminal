<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outline badge: stroked figures, filled accent (premium monochrome look) -->
  <rect width="64" height="64" rx="14" fill="#0A0F0D"/>
  <rect x="1" y="1" width="62" height="62" rx="13" stroke="#10B981" stroke-opacity="0.25" stroke-width="1.5"/>
  <!-- Figure 1 (short, outline) -->
  <circle cx="18" cy="35" r="2.9" stroke="#F8FAFC" stroke-width="1.8" fill="none"/>
  <rect x="15.1" y="40.9" width="5.8" height="10.6" rx="2.9" stroke="#F8FAFC" stroke-width="1.8" fill="none"/>
  <!-- Figure 2 (medium, outline) -->
  <circle cx="32" cy="27" r="2.9" stroke="#F8FAFC" stroke-width="1.8" fill="none"/>
  <rect x="29.1" y="32.9" width="5.8" height="18.6" rx="2.9" stroke="#F8FAFC" stroke-width="1.8" fill="none"/>
  <!-- Figure 3 (tall, solid accent) -->
  <circle cx="46" cy="19" r="3.4" fill="#10B981"/>
  <rect x="42.6" y="24.4" width="6.8" height="27.6" rx="3.4" fill="#10B981"/>
</svg>
